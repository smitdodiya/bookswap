# Render Blueprint — free single-service deploy for BookSwap.
# The Express server serves the built React app AND the /api routes.
# Database is external (Neon Postgres) — set DATABASE_URL in the dashboard.
services:
  - type: web
    name: bookswap
    runtime: node
    plan: free
    # Build the client and generate the Prisma client.
    buildCommand: npm run build
    # Sync the schema to Postgres, then start the server.
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Auto-generated strong secret for signing JWTs.
      - key: JWT_SECRET
        generateValue: true
      # Paste your Neon connection string here in the Render dashboard.
      # (sync: false means Render will NOT store it in git — you set it manually.)
      - key: DATABASE_URL
        sync: false
